name: Deploy web to GitHub Pages

# Builds the SvelteKit app (web/) as a static site and publishes it to Pages.
# The project site lives at https://<owner>.github.io/contxt/, so BASE_PATH=/contxt.
on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch: {} # lets you deploy from any branch via the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; newer pushes cancel in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      # npm install (not ci): the committed lockfile omits Linux-only optional
      # deps (@emnapi/*) since it was generated on macOS, so ci's strict sync
      # check fails on the runner. install reconciles them.
      - run: npm install --no-audit --no-fund
      - run: npm run build
        env:
          BASE_PATH: /contxt
      - run: touch build/.nojekyll # keep Pages from stripping the _app/ folder
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
